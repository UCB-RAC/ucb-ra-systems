# Components: platforms, systems, and applications (replaces systems.yaml).
#
# Fields:
#   id              unique slug (referenced by flows.yaml, part_of, uses)
#   name            display name
#   kind            platform | system | application
#                     platform    = shared tech other components run on (VMware, Oracle DB, SharePoint)
#                     system      = independently deployed & operated software (Phoebe, BFS, eProtocol)
#                     application = user-facing capability inside a system (PI Portfolio, IRB module)
#   category        business service / functional area (drives color)
#   platform        free-text tech stack description
#   part_of         containing system id (applications only; optional)
#   uses            [component ids] — platforms/systems this component runs on or depends on
#   provided_by     who develops/supplies it — vendor name or in-house team (free text)
#   run_by          [org ids] — who administers/operates it (drives the central-IT view)
#   technical_owner person — technical owner/contact (free text)
#   business_owner  [org ids] — whose service it is
#   users           free text
#   apis            yes | no | unknown
#   status          active | being-replaced | forthcoming (default active)
#   verified        false => contains Claude's guesses — confirm and flip to true
#   note            free text
#
# Applications inherit run_by / business_owner / uses from their part_of system
# when not set. Edit freely, then run:  python3 build.py  (or uv run python build.py)

